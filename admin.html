<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FILL ME IN | Content Editor</title>
    <link rel="stylesheet" href="admin.css">
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="eyebrow">Backend editor</p>
          <h1>Landing page texts</h1>
        </div>
        <a class="preview-link" href="/" target="_blank" rel="noreferrer">Open page</a>
      </header>

      <form class="editor-form" data-editor-form>
        <section class="editor-section">
          <h2>Hero</h2>
          <label>Page title <input name="siteTitle"></label>
          <label>Brand in header <input name="brand"></label>
          <label>Eyebrow <input name="heroEyebrow"></label>
          <label>Heading line 1 <input name="heroTitleLine1"></label>
          <label>Heading line 2 <input name="heroTitleLine2"></label>
          <label>Intro text <textarea name="heroLead" rows="4"></textarea></label>
          <label>Subtext below intro (date, pre-order) <input name="heroSub"></label>
          <label>Cover caption <input name="coverCaption"></label>
        </section>

        <section class="editor-section">
          <h2>Navigation &amp; buttons</h2>
          <label>Navigation: Inside <input name="navInside"></label>
          <label>Navigation: Preview <input name="navPreview"></label>
          <label>Navigation: Pre-order <input name="navBuy"></label>
          <label>Primary CTA <input name="primaryCta"></label>
          <label>Secondary CTA <input name="secondaryCta"></label>
        </section>

        <section class="editor-section">
          <h2>Content</h2>
          <label>Section eyebrow <input name="insideEyebrow"></label>
          <label>Section heading <textarea name="insideTitle" rows="3"></textarea></label>
          <label>Box 1 title <input name="feature1Title"></label>
          <label>Box 1 text <textarea name="feature1Text" rows="3"></textarea></label>
          <label>Box 2 title <input name="feature2Title"></label>
          <label>Box 2 text <textarea name="feature2Text" rows="3"></textarea></label>
          <label>Box 3 title <input name="feature3Title"></label>
          <label>Box 3 text <textarea name="feature3Text" rows="3"></textarea></label>
        </section>

        <section class="editor-section">
          <h2>Preview &amp; ticker</h2>
          <label>Preview eyebrow <input name="previewEyebrow"></label>
          <label>Preview heading <textarea name="previewTitle" rows="3"></textarea></label>
          <label>Preview subtitle <input name="previewSubtitle"></label>
          <label>Button text below preview <input name="previewCta"></label>
          <label>Ticker items, one per line <textarea name="tickerItems" rows="7"></textarea></label>
        </section>

        <section class="editor-section">
          <h2>Cart</h2>
          <label>Purchase eyebrow <input name="buyEyebrow"></label>
          <label>Purchase heading <input name="buyTitle"></label>
          <label>Purchase text <textarea name="buyText" rows="4"></textarea></label>
          <label>Price label <input name="priceLabel"></label>
          <label>Price <input name="price"></label>
          <label>Button text <input name="cartButton"></label>
          <label>Note below button <textarea name="cartNote" rows="3"></textarea></label>
          <label>Message when URL missing <textarea name="cartMissingNote" rows="2"></textarea></label>
          <label>Redirecting text <input name="cartRedirecting"></label>
          <label>Upgates cart URL <input name="cartUrl" placeholder="https://..."></label>
        </section>

        <section class="editor-section">
          <h2>Footer</h2>
          <label>Left side <input name="footerLeft"></label>
          <label>Right side <input name="footerRight"></label>
        </section>

        <div class="form-actions">
          <button type="submit">Save texts</button>
          <span class="status" data-status></span>
        </div>
      </form>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
